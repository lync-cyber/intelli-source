# yaml-language-server: $schema=../schema/sources.schema.json
# ↑ 编辑器据此补全/校验 type(rss|api|web)、必填 url 等；路径相对本文件，复制到
#   config/sources/ 后同样指向 config/schema/sources.schema.json（同为 config/ 下一级）。
# ============================================================
# 信源配置 (source) 示例  —  内容从哪来（rss / api / web）
# ------------------------------------------------------------
# 谁会读它: ConfigLoader（经 IS_SOURCE_CONFIG_DIR 扫描 config/sources/）
# 怎么生效: 复制到 config/sources/ → `intellisource source diff` 预览 → reload
# 复制命令: cp config/examples/sources.example.yaml config/sources/sources.yaml
# 支持 ${ENV_VAR} 环境变量占位符
# 配置全貌: 见 config/README.md
# ============================================================

sources:
  - name: "Hacker News"
    type: "rss"
    url: "https://hnrss.org/frontpage"
    tags: ["tech", "news"]
    schedule_interval: 1800
    schedule_adaptive: true

  - name: "GitHub Trending"
    type: "web"
    url: "https://github.com/trending"
    tags: ["tech", "open-source"]
    schedule_interval: 3600
    schedule_adaptive: false
    rate_limit_qps: 1.0
    rate_limit_concurrency: 1

  - name: "Weather API"
    type: "api"
    url: "https://api.example.com/v1/weather"
    tags: ["weather", "data"]
    schedule_interval: 7200
    proxy: "${HTTP_PROXY}"
    metadata:
      api_key: "${WEATHER_API_KEY}"
      format: "json"
