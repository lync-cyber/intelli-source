# yaml-language-server: $schema=../schema/subscriptions.schema.json
# ↑ 编辑器据此补全/校验 channel(wechat|wework|email)、必填字段等；路径相对本文件，
#   复制到 config/subscriptions/ 后同样指向 config/schema/subscriptions.schema.json。
# ============================================================
# 订阅配置 (subscription) 示例  —  把匹配内容推给谁、走哪个渠道
# ------------------------------------------------------------
# 谁会读它: SubscriptionLoader（经 IS_SUBSCRIPTION_CONFIG_DIR 扫描 config/subscriptions/）
# 怎么生效: 复制到 config/subscriptions/ → `intellisource subscriptions reload`
# 复制命令: cp config/examples/subscriptions.example.yaml config/subscriptions/subscriptions.yaml
# 配置全貌: 见 config/README.md
# ------------------------------------------------------------
# config/subscriptions/*.yaml 是订阅配置的 source-of-truth。
# 通过 API / CLI 对订阅的改动会在下次 reload 时被覆盖。
# 从 yaml 中移除的订阅会被软删（status=paused），不会丢失推送历史。
# 支持 ${ENV_VAR} 环境变量占位符（与 sources.yaml 一致）。
# ============================================================

subscriptions:
  - name: "AI 早报 - WeWork"
    channel: "wework"
    channel_config:
      user_id: "@all"          # 企业微信成员 user_id，多个用 | 分隔；@all 推全员
      msg_type: "markdown"     # text / markdown / news
    match_rules:
      tags: ["ai"]
      # source_names: ["HN RSS"]  # 可选：仅订阅指定信源（B-057）。字符串按 source 名比对，
      #                            # 不做加载顺序耦合；source 不存在 = 无匹配，不报错。
      #                            # 设置后变为强约束：source 不匹配即整条订阅丢弃。
    frequency: "realtime"
    timezone: "Asia/Shanghai"

  - name: "Tech Digest - Email"
    channel: "email"
    channel_config:
      to_addr: "${IS_DIGEST_EMAIL_TO}"   # 从环境变量读取避免硬编码
      # —— 周期 digest 专属（仅 frequency=daily/weekly 生效；realtime 逐条推送不读这些）——
      template: "daily-brief"            # 省略=按 frequency 自动：daily→daily-brief / weekly→weekly-roundup
      #                                   可选: daily-brief | weekly-roundup | topic-deepdive | json-feed
      template_config:
        render_mode: "code"             # 渲染模式三档（默认 code，零成本零风险）：
        #   code         — 纯模板渲染，不调 LLM；确定性最高、零额外成本（默认）
        #   llm-assisted — 模板骨架不变，LLM 仅补 intro / 每条"为什么重要"，正文结构受控
        #   llm-freeform — LLM 整体生成正文，带护栏（契约校验 / HTML 消毒 / 敏感词复检 / 失败回退 code）
        # render_budget_chars: 6000     # 仅 llm-freeform：喂给 LLM 的内容字符预算，超出截断
    match_rules:
      tags: ["tech"]
    frequency: "daily"
    quiet_hours:
      # 静默时段：落在 [start, end) 内不推送（周期 digest 顺延到时段结束）。
      # 时间按本订阅的 timezone 解释（未配 timezone 时默认 Asia/Shanghai）。
      # 支持跨午夜：start > end 时表示跨天，如 22:00→08:00 = 夜间静默。
      start: "22:00"
      end: "08:00"

  - name: "Security Alerts - WeChat"
    channel: "wechat"
    channel_config: {}          # 公众号 v1 无 per-subscription 目标字段
    match_rules:
      tags: ["security"]
    frequency: "realtime"

  # ── 完整匹配维度示例（match_rules 五个已识别键；其它键名 reload 时 WARN 但不阻断）──
  # 命中规则（详见仓库根 README.md §订阅匹配规则 match_rules 语义）：
  #   先过强约束（source_names / keywords 的 + 必含 / ! 必不含），再 OR 命中任一正向维度
  #   （keywords 普通词 / tags / discipline_tags），最后按 min_score 过滤。
  - name: "AI 安全深度 - Email"
    channel: "email"
    channel_config:
      to_addr: "${IS_DIGEST_EMAIL_TO}"
    match_rules:
      keywords:
        - "transformer"        # 普通词：大小写不敏感，命中即正向匹配（OR）
        - "+security"          # + 必含：整条订阅要求正文含 "security"（AND 强约束）
        - "!招聘"               # ! 必不含：正文出现即整条丢弃
        - "/CVE-\\d{4}-\\d+/"  # /regex/：正则匹配（大小写敏感，带 ReDoS 超时保护）
      tags: ["ai", "security"]          # 任一标签命中即正向匹配（OR）
      discipline_tags: ["cybersecurity"] # 学科标签，与 tags 独立的另一正向维度
      source_names: ["HN RSS", "arXiv"]  # 强约束：内容信源必须在此列表，否则整条丢弃
      min_score: 0.6                     # 相关性阈值：低于此分的内容被过滤（0 = 不过滤）
    frequency: "weekly"
    timezone: "Asia/Shanghai"

