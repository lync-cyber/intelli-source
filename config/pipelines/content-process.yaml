name: content-process
mode: batch
max_steps: 20
tools_allowed:
  - regex_extract
  - fingerprint_generate
  - fingerprint_dedup
  - vector_search_similar
  - find_nearest_cluster
  - tfidf_keywords
  - truncate_summary
  - keyword_tag
  - filter_sensitive
  - llm_complete
tools_denied: []
steps:
  - processor: HTMLParser
  - processor: ContentDedup
  - processor: KeywordTagger
    params:
      keywords:
        ai: ["ai", "artificial intelligence", "machine learning", "ml", "llm", "gpt", "neural"]
        security: ["security", "vulnerability", "cve", "exploit", "breach", "vpn", "encryption"]
        web: ["html", "css", "javascript", "browser", "http", "api", "rest"]
        cloud: ["aws", "azure", "gcp", "kubernetes", "k8s", "docker", "serverless"]
        opensource: ["github", "open source", "open-source", "linux", "git", "fork"]
        startup: ["yc ", " (yc ", "startup", "founder", "funding", "series a", "seed round"]
        data: ["database", "postgres", "sql", "data engineering", "pipeline"]
        language: ["python", "rust", "golang", " go ", "typescript", "java"]
  - processor: LLMSummarizer
  - processor: EmbeddingProcessor
