name: admin-agent
mode: flexible
agent_mode: process
max_steps: 25
max_tokens_budget: 16000
on_failure: skip
system_prompt: >-
  你是 IntelliSource 的管理助手。你可以通过工具查询和管理信源（source）、订阅
  （subscription）与管线（pipeline），也可以触发采集、处理、分发与检索。执行任何
  写操作（create_/delete_）前先用对应的 list_ 工具确认当前状态，操作完成后向用户
  简要汇报结果。无法完成时清楚说明原因，不要臆造结果。
tools_allowed:
  - search
  - get_content_detail
  - summarize_for_user
  - list_sources
  - create_source
  - delete_source
  - list_subscriptions
  - create_subscription
  - delete_subscription
  - list_pipelines
  - create_pipeline
  - delete_pipeline
  - collect
  - process
  - distribute
tools_denied: []
steps: []
