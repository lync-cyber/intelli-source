# yaml-language-server: $schema=../schema/pipeline.schema.json
name: manual-collect
mode: strict
max_steps: 20
on_failure: abort
tools_allowed:
  - collect
  - process
  - distribute
  - regex_extract
  - fingerprint_generate
  - fingerprint_dedup
  - tfidf_keywords
  - truncate_summary
  - keyword_tag
  - filter_sensitive
tools_denied: []
steps:
  - tool: collect
    params: {}
  - tool: process
    params: {}
  - tool: distribute
    params: {}
