name: manual-collect
mode: strict
max_steps: 20
on_failure: abort
tools_allowed:
  - collect
  - distribute
  - regex_extract
  - fingerprint_generate
  - fingerprint_dedup
  - tfidf_keywords
  - truncate_summary
  - keyword_tag
  - filter_sensitive
tools_denied: []
steps:
  - tool: collect
    params:
      source_type: manual
  - tool: process
    params:
      pipeline: default
  - tool: distribute
    params:
      channels: all
