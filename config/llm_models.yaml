default_model:
  model: deepseek/deepseek-v4-flash
  provider: deepseek

models:
  extract:
    model: deepseek/deepseek-v4-flash
    provider: deepseek
    temperature: 0.0
    max_tokens: 4096
    thinking: disabled
  summarize:
    model: deepseek/deepseek-v4-pro
    provider: deepseek
    temperature: 0.3
    max_tokens: 2048
    thinking: enabled
    reasoning_effort: high
  dedup:
    model: deepseek/deepseek-v4-flash
    provider: deepseek
    temperature: 0.0
    max_tokens: 1024
    thinking: disabled
  tag:
    model: deepseek/deepseek-v4-flash
    provider: deepseek
    temperature: 0.1
    max_tokens: 512
    thinking: disabled
  chat:
    model: deepseek/deepseek-v4-flash
    provider: deepseek
    temperature: 0.7
    max_tokens: 2048
    thinking: disabled

profiles:
  deepseek/deepseek-v4-flash:
    temperature: 0.1
    max_tokens: 4096
    context_window: 1000000
    prompt_style: default
    timeout_seconds: 60
    thinking: disabled
  deepseek/deepseek-v4-pro:
    temperature: 0.3
    max_tokens: 4096
    context_window: 1000000
    prompt_style: concise
    timeout_seconds: 120
    thinking: enabled
    reasoning_effort: high
