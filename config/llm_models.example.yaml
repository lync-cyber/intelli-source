default_model:
  model: gpt-4o-mini
  provider: openai

models:
  extract:
    model: gpt-4o-mini
    provider: openai
    temperature: 0.0
    max_tokens: 4096
  summarize:
    model: claude-3-haiku-20240307
    provider: anthropic
    temperature: 0.3
    max_tokens: 2048
  dedup:
    model: gpt-4o-mini
    provider: openai
    temperature: 0.0
    max_tokens: 1024
  tag:
    model: deepseek/deepseek-chat
    provider: deepseek
    temperature: 0.1
    max_tokens: 512

profiles:
  gpt-4o-mini:
    temperature: 0.1
    max_tokens: 4096
    context_window: 128000
    prompt_style: default
    timeout_seconds: 60
  claude-3-haiku-20240307:
    temperature: 0.3
    max_tokens: 2048
    context_window: 200000
    prompt_style: concise
    timeout_seconds: 90
  deepseek/deepseek-chat:
    temperature: 0.1
    max_tokens: 4096
    context_window: 64000
    prompt_style: structured
    timeout_seconds: 60
