name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly dependency graph snapshot (UTC 02:00).
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest tests/unit/ -q --tb=short -m "not slow"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Pre-pull pgvector image (testcontainers warm-up)
        run: docker pull pgvector/pgvector:pg16

      - name: Run integration tests
        env:
          IS_FORCE_DOCKER_TESTS: "1"
        run: uv run pytest tests/integration/ -v --tb=short --timeout=300 --timeout-method=thread

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run ruff lint
        run: uv run ruff check .

      # ------------------------------------------------------------------
      # Architecture governance toolchain (wired in pyproject.toml).
      # Baseline closed: B-020..B-028 all resolved. Violations now block merge.
      # ------------------------------------------------------------------
      - name: Architecture contracts (import-linter)
        run: uv run lint-imports --no-cache

      - name: Dependency hygiene (deptry)
        run: uv run deptry src

      - name: Dead code (vulture)
        run: uv run vulture

      - name: Validate Prometheus alert rules (promtool)
        run: >-
          docker run --rm
          -v ${{ github.workspace }}/docker/prometheus:/etc/prometheus
          prom/prometheus:v2.55.1
          promtool check rules /etc/prometheus/alerts.yml

  arch-graph:
    name: Dependency Graph Snapshot
    runs-on: ubuntu-latest
    # Nightly + manual only; never on PRs (rendering is slow and the artifact
    # is for human inspection, not for gating).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Render dependency graph
        run: |
          mkdir -p docs/arch
          uv run pydeps src/intellisource \
            --max-bacon=2 --cluster --noshow \
            -o docs/arch/deps-graph.svg

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-graph
          path: docs/arch/deps-graph.svg
