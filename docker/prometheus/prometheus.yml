global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: intellisource

rule_files:
  - /etc/prometheus/alerts.yml

# Hook Alertmanager when one is wired up via docker-compose. Until then the
# alerts still evaluate inside Prometheus, just don't dispatch notifications.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: intellisource-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: api

  - job_name: intellisource-worker
    metrics_path: /api/v1/metrics
    static_configs:
      # Worker exposes the same MetricsCollector via the API process for now;
      # split-out worker metrics endpoint is tracked in the deploy backlog.
      - targets:
          - api:8000
        labels:
          service: worker
