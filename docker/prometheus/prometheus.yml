global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: intellisource

rule_files:
  - /etc/prometheus/alerts.yml

# Hook Alertmanager when one is wired up via docker-compose. Until then the
# alerts still evaluate inside Prometheus, just don't dispatch notifications.
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  # Single scrape target: the API /api/v1/metrics endpoint serves both
  # API-process families (http_*/llm_*/pushes_total/llm_circuit_open/health)
  # and worker-process families (celery_*). Worker children record celery_*
  # into a shared Redis metric store (each prefork child owns a separate
  # in-process collector that is never served over HTTP); the API endpoint
  # merges that store into its exposition at scrape time. A separate
  # per-process worker endpoint is therefore unnecessary.
  - job_name: intellisource-api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets:
          - api:8000
        labels:
          service: api
