# Project name → containers/network/volumes are prefixed `intellisource-*`
# (e.g. intellisource-api-1) instead of inheriting the compose file's parent
# dir name (`docker`). Applies to both `make` and `intellisource up`, which
# invoke `docker compose -f docker/docker-compose.yml` without `-p`.
name: intellisource

services:

  db:
    build:
      context: ..
      dockerfile: docker/db.Dockerfile
    image: intellisource/db:pg16-pgvector-zhparser
    environment:
      POSTGRES_USER: ${IS_DB_USER:-intellisource}
      POSTGRES_PASSWORD: ${IS_DB_PASSWORD:?set IS_DB_PASSWORD in docker/.env}
      POSTGRES_DB: ${IS_DB_NAME:-intellisource}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${IS_DB_USER:-intellisource} -d ${IS_DB_NAME:-intellisource}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}"]
    environment:
      # redis-cli (healthcheck) reads REDISCLI_AUTH, keeping the password off the
      # command line / process list.
      REDISCLI_AUTH: ${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["python", "-m", "alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      IS_DATABASE_URL: ${IS_DATABASE_URL:-postgresql+asyncpg://${IS_DB_USER:-intellisource}:${IS_DB_PASSWORD:?set IS_DB_PASSWORD in docker/.env}@db:5432/${IS_DB_NAME:-intellisource}}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - uvicorn
      - "intellisource.main:create_app"
      - "--factory"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    ports:
      - "8000:8000"
    volumes:
      - ../config:/app/config:ro
    env_file:
      - .env
    environment:
      IS_DATABASE_URL: ${IS_DATABASE_URL:-postgresql+asyncpg://${IS_DB_USER:-intellisource}:${IS_DB_PASSWORD:?set IS_DB_PASSWORD in docker/.env}@db:5432/${IS_DB_NAME:-intellisource}}
      IS_REDIS_URL: ${IS_REDIS_URL:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/0}
      IS_EMBEDDING_API_BASE: ${IS_EMBEDDING_API_BASE:-http://embedding/v1}
      IS_EMBEDDING_API_KEY: ${IS_EMBEDDING_API_KEY:-tei}
      IS_EMBEDDING_DIMENSION: ${IS_EMBEDDING_DIMENSION:-1024}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      embedding:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys\ntry: sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=5).status==200 else 1)\nexcept Exception: sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - celery
      - "-A"
      - "intellisource.scheduler.boot"
      - worker
      - "--loglevel=info"
    volumes:
      - ../config:/app/config:ro
    env_file:
      - .env
    environment:
      IS_DATABASE_URL: ${IS_DATABASE_URL:-postgresql+asyncpg://${IS_DB_USER:-intellisource}:${IS_DB_PASSWORD:?set IS_DB_PASSWORD in docker/.env}@db:5432/${IS_DB_NAME:-intellisource}}
      IS_REDIS_URL: ${IS_REDIS_URL:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/0}
      IS_CELERY_BROKER_URL: ${IS_CELERY_BROKER_URL:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/0}
      IS_CELERY_RESULT_BACKEND: ${IS_CELERY_RESULT_BACKEND:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/1}
      IS_EMBEDDING_API_BASE: ${IS_EMBEDDING_API_BASE:-http://embedding/v1}
      IS_EMBEDDING_API_KEY: ${IS_EMBEDDING_API_KEY:-tei}
      IS_EMBEDDING_DIMENSION: ${IS_EMBEDDING_DIMENSION:-1024}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding:
        condition: service_started
    healthcheck:
      test: ["CMD", "celery", "-A", "intellisource.scheduler.boot", "status"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command:
      - celery
      - "-A"
      - "intellisource.scheduler.boot"
      - beat
      - "--loglevel=info"
    env_file:
      - .env
    environment:
      IS_DATABASE_URL: ${IS_DATABASE_URL:-postgresql+asyncpg://${IS_DB_USER:-intellisource}:${IS_DB_PASSWORD:?set IS_DB_PASSWORD in docker/.env}@db:5432/${IS_DB_NAME:-intellisource}}
      IS_REDIS_URL: ${IS_REDIS_URL:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/0}
      IS_CELERY_BROKER_URL: ${IS_CELERY_BROKER_URL:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/0}
      IS_CELERY_RESULT_BACKEND: ${IS_CELERY_RESULT_BACKEND:-redis://:${IS_REDIS_PASSWORD:?set IS_REDIS_PASSWORD in docker/.env}@redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    restart: unless-stopped

  embedding:
    image: ${IS_EMBEDDING_IMAGE:-ghcr.io/huggingface/text-embeddings-inference:cpu-1.6}
    command: --model-id BAAI/bge-m3
    volumes:
      - embedding_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    profiles:
      - walkthrough
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  prometheus_data:
  embedding_data:
